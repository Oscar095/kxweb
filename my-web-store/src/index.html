<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tienda KosXpress</title>
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>
  <div id="app">
    <header id="site-header"></header>
    <main style="position: relative; overflow: hidden;">
      <!-- Futuristic Orbs -->
      <div class="bg-orb orb-blue"></div>
      <div class="bg-orb orb-orange"></div>

      <section id="hero" class="hero">
        <div class="hero-inner-glass">
          <div class="hero-content">
            <span class="badge">Nuevos Empaques</span>
            <h1>Calidad Premium para tu Negocio</h1>
            <p>Descubre nuestra línea de envases para alimentos, diseñados para mantener la frescura y presentación impecable de tus productos.</p>
            <div class="hero-actions">
              <button class="btn-primary" onclick="document.getElementById('catalog').scrollIntoView({ behavior: 'smooth' })">Ver Catálogo Completo</button>
            </div>
          </div>
          <div class="hero-visuals">
            <div class="floating-item item-1">
              <img src="images/portaperro.png" alt="Porta Perro">
            </div>
             <div class="floating-item item-main">
              <img src="images/Productos.png" alt="Productos Variados">
            </div>
            <div class="floating-item item-2">
              <img src="images/portahamburguesa.png" alt="Porta Hamburguesa">
            </div>
            <div class="floating-item item-3">
              <img src="images/4oz.png" alt="Salseros">
            </div>
          </div>
        </div>
      </section>

      <section id="catalog" style="padding-top: 60px;">
        <div class="container" style="text-align:center;">
          <h2 style="font-size: 2.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;">Descubre
            Nuestros Productos</h2>
          <p style="font-size: 1.1rem; color: var(--muted); margin-bottom: 32px;">Explora la tienda por categorías para
            encontrar la mejor calidad y diseño.</p>
        </div>

        <div class="catalog-header container" style="display: none;" id="catalog-nav">
          <button id="btn-back-categories" class="btn-back"><span>←</span> Volver a Categorías</button>
          <h3 id="current-category-title" style="margin:0; font-size:1.5rem; color: var(--primary);"></h3>
        </div>

        <section id="category-grid" class="category-hub container" style="display: none;"></section>
        <section id="products" class="product-grid animated-products container" style="display: none;"></section>
      </section>
    </main>

    <div id="cart-drawer" class="cart-drawer"></div>
    <footer class="site-footer"></footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>

</html>
