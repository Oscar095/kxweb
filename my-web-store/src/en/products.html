  <div id="app">
    <header id="site-header"></header>
    <main class="products-layout-wrapper">
      <div class="bg-orb orb-blue" style="top: 10%; left: 5%;"></div>
      <div class="bg-orb orb-orange" style="top: 60%; right: 5%;"></div>

      <!-- Main Content Area -->
      <div class="catalog-v2-main">
        <div class="v2-header-bar">
          <div class="v2-header-left">
            <h1 id="products-page-title">Full Catalog</h1>
            <span class="v2-product-count" id="product-count-badge">0 products</span>
          </div>
        </div>

        <!-- Mobile category toggle -->
        <div class="mobile-cat-toggle-wrapper mobile-only">
          <button id="mobile-cat-toggle" class="mobile-cat-toggle custom-dropdown glass">
            <span class="filter-control-wrap">
              <span class="filter-label-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h7"></path></svg>
              </span>
              <span class="dropdown-selected-label">Browse by Category</span>
              <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </span>
          </button>
        </div>

        <!-- Sidebar -->
        <aside class="catalog-v2-sidebar" id="category-sidebar">
          <h2 class="sidebar-title v2-sidebar-title">Categories</h2>
          <div class="v2-cat-list" id="cat-btn-group">
            <!-- Dynamic category buttons -->
          </div>
        </aside>

        <!-- Filters -->
        <div class="products-filter-premium" id="filter-bar">
          <div class="filter-group-premium">
            <!-- Availability Dropdown -->
            <div class="custom-dropdown glass" id="filter-dropdown">
              <button class="filter-control-wrap" type="button">
                <span class="filter-label-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                </span>
                <span class="dropdown-selected-label">All Inventory</span>
              </button>
              <ul class="dropdown-list glass-panel">
                <li data-value="all" class="is-selected">All Inventory</li>
                <li data-value="disponible">In Stock</li>
              </ul>
            </div>
            
            <!-- Sort Dropdown -->
            <div class="custom-dropdown glass" id="sort-dropdown">
              <button class="filter-control-wrap" type="button">
                <span class="filter-label-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                </span>
                <span class="dropdown-selected-label">Recommended</span>
              </button>
              <ul class="dropdown-list glass-panel">
                <li data-value="default" class="is-selected">Recommended</li>
                <li data-value="asc">Price: Low to High</li>
                <li data-value="desc">Price: High to Low</li>
              </ul>
            </div>
          </div>
        </div>

        <section id="products" class="v2-product-grid"></section>
      </div>
    </main>
    <div id="cart-drawer" class="cart-drawer"></div>
    <script type="module" src="./products-page.js"></script>
    <footer class="site-footer"></footer>
  </div>
  <script src="../utils/tracker.js"></script>
