<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productos - KosXpress</title>
  <meta name="description" content="Explora nuestro catalogo de empaques desechables, vasos, portacomidas, bolsas y mas. Precios al por mayor con envio a toda Colombia.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://kosxpress.com/products">
  <link rel="icon" type="image/png"
    href="https://datalakekos.blob.core.windows.net/images/products/Logos/1769050336206-rm5z6p-1768930438351-fr3gz7-LOGO%20KOS%20XPRESS_Mesa%20de%20trabajo%201%20copia.png">
  <link rel="apple-touch-icon"
    href="https://datalakekos.blob.core.windows.net/images/products/Logos/1769050336206-rm5z6p-1768930438351-fr3gz7-LOGO%20KOS%20XPRESS_Mesa%20de%20trabajo%201%20copia.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kosxpress.com/products">
  <meta property="og:title" content="Productos - KosXpress">
  <meta property="og:description" content="Catalogo de empaques desechables, vasos, portacomidas, bolsas y mas. Precios al por mayor.">
  <meta property="og:image" content="https://datalakekos.blob.core.windows.net/images/products/Logos/1769050336206-rm5z6p-1768930438351-fr3gz7-LOGO%20KOS%20XPRESS_Mesa%20de%20trabajo%201%20copia.png">
  <meta property="og:site_name" content="KosXpress">
  <meta property="og:locale" content="es_CO">
  <link rel="preconnect" href="https://datalakekos.blob.core.windows.net">
  <link rel="dns-prefetch" href="https://datalakekos.blob.core.windows.net">
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>
  <div id="app">
    <header id="site-header"></header>

    <main class="catalog-v2-wrapper">
      <!-- Sidebar -->
      <aside class="catalog-v2-sidebar">
        <p class="v2-sidebar-title">Categorias</p>
        <nav class="v2-cat-list" id="v2-cat-list">
          <button class="v2-cat-btn active" data-cat="all">
            Todos <span class="v2-cat-count" id="v2-count-all">-</span>
          </button>
        </nav>
      </aside>

      <!-- Main content -->
      <div class="catalog-v2-main">
        <!-- Header bar -->
        <div class="v2-header-bar">
          <div class="v2-header-left">
            <h1 id="v2-page-title">Catalogo</h1>
            <span class="v2-product-count" id="v2-product-count"></span>
          </div>
          <div class="v2-controls">
            <select id="v2-filter" class="v2-pill-select" aria-label="Filtrar disponibilidad">
              <option value="all">Todos</option>
              <option value="disponible">Disponible</option>
              <option value="no-disponible">No disponible</option>
            </select>
            <select id="v2-sort" class="v2-pill-select" aria-label="Ordenar por precio">
              <option value="default">Ordenar</option>
              <option value="asc">Precio: Menor a Mayor</option>
              <option value="desc">Precio: Mayor a Menor</option>
            </select>
          </div>
        </div>

        <!-- Product grid (skeleton first, then real products) -->
        <section id="v2-products" class="v2-product-grid"></section>
      </div>
    </main>

    <!-- Scroll to top -->
    <button class="v2-scroll-top" id="v2-scroll-top" aria-label="Volver arriba">&#8593;</button>

    <div id="cart-drawer" class="cart-drawer"></div>
    <script type="module" src="./products-page.js?v=3.0"></script>
    <footer class="site-footer"></footer>
  </div>
  <script src="./utils/tracker.js"></script>
</body>

</html>
