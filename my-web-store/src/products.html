<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productos - KosXpress</title>
  <meta name="description" content="Explora nuestro catalogo de empaques desechables, vasos, portacomidas, bolsas y mas. Precios al por mayor con envio a toda Colombia.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://kosxpress.com/products">
  <link rel="icon" type="image/png"
    href="https://datalakekos.blob.core.windows.net/images/products/Logos/1769050336206-rm5z6p-1768930438351-fr3gz7-LOGO%20KOS%20XPRESS_Mesa%20de%20trabajo%201%20copia.png">
  <link rel="apple-touch-icon"
    href="https://datalakekos.blob.core.windows.net/images/products/Logos/1769050336206-rm5z6p-1768930438351-fr3gz7-LOGO%20KOS%20XPRESS_Mesa%20de%20trabajo%201%20copia.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kosxpress.com/products">
  <meta property="og:title" content="Productos - KosXpress">
  <meta property="og:description" content="Catalogo de empaques desechables, vasos, portacomidas, bolsas y mas. Precios al por mayor.">
  <meta property="og:image" content="https://datalakekos.blob.core.windows.net/images/products/Logos/1769050336206-rm5z6p-1768930438351-fr3gz7-LOGO%20KOS%20XPRESS_Mesa%20de%20trabajo%201%20copia.png">
  <meta property="og:site_name" content="KosXpress">
  <meta property="og:locale" content="es_CO">
  <link rel="preconnect" href="https://datalakekos.blob.core.windows.net">
  <link rel="dns-prefetch" href="https://datalakekos.blob.core.windows.net">
  <link rel="stylesheet" href="styles/main.css?v=30.0">
</head>

<body>
  <div id="app">
    <header id="site-header"></header>
    <main class="products-layout-wrapper">
      <div class="bg-orb orb-blue" style="top: 10%; left: 5%;"></div>
      <div class="bg-orb orb-orange" style="top: 60%; right: 5%;"></div>

      <!-- Sidebar for Navigation -->
      <!-- Sidebar for Navigation (Desktop) -->
      <aside class="category-sidebar" id="category-sidebar">
        <h2 class="sidebar-title v2-sidebar-title">Categorías</h2>
        <div class="v2-cat-list" id="cat-btn-group">
          <!-- Dynamic category buttons -->
        </div>
      </aside>

      <!-- Main Content Area -->
      <div class="catalog-v2-main">
        <div class="v2-header-bar">
          <div class="v2-header-left">
            <h1 id="products-page-title">Catálogo Completo</h1>
            <span class="v2-product-count" id="product-count-badge">0 productos</span>
          </div>
        </div>

        <!-- Mobile category toggle re-positioned below title -->
        <div class="mobile-cat-toggle-wrapper mobile-only">
          <button id="mobile-cat-toggle" class="mobile-cat-toggle">
            <span>Explora por Categoría</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
        </div>

        <!-- Eye-Catching Premium Filters -->
        <div class="products-filter-premium reveal" id="filter-bar">
          <div class="filter-group-premium">
            <!-- Custom Dropdown: Availability -->
            <div class="custom-dropdown glass" id="filter-dropdown">
              <button class="filter-control-wrap" type="button">
                <span class="filter-label-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                </span>
                <span class="dropdown-selected-label">Todo el Inventario</span>
              </button>
              <ul class="dropdown-list glass-panel">
                <li data-value="all" class="is-selected">Todo el Inventario</li>
                <li data-value="disponible">En Existencia</li>
              </ul>
            </div>
            
            <!-- Custom Dropdown: Sort -->
            <div class="custom-dropdown glass" id="sort-dropdown">
              <button class="filter-control-wrap" type="button">
                <span class="filter-label-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                </span>
                <span class="dropdown-selected-label">Recomendados</span>
              </button>
              <ul class="dropdown-list glass-panel">
                <li data-value="default" class="is-selected">Recomendados</li>
                <li data-value="asc">Precio: Bajo a Alto</li>
                <li data-value="desc">Precio: Alto a Bajo</li>
              </ul>
            </div>
          </div>
        </div>

        <section id="products" class="v2-product-grid"></section>
      </div>
    </main>
    <div id="cart-drawer" class="cart-drawer"></div>
    <script type="module" src="./products-page.js?v=36.0"></script>
    <footer class="site-footer"></footer>
  </div>
  <script src="./utils/tracker.js"></script>
</body>

</html>
